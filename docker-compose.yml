version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chai_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: btech_chai_wala
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically run the SQL script to create tables when the database first starts
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: chai_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=btech_chai_wala
      - JWT_SECRET=supersecretkey123
      - PORT=5000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Keep uploaded images persistent on the host machine
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: chai_frontend
    ports:
      - "5173:80" # Maps local port 5173 to container port 80 (Nginx)
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
